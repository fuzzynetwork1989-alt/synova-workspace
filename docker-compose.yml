version: '3.8'

# Synova AI v4.1 - Complete Docker Compose Configuration
# Production-ready containerized stack for autonomous XR architecture

services:
  # Ollama AI Service
  synova-brain:
    image: ollama/ollama:latest
    container_name: synova-brain
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama
      - ./synova-brain/models:/models
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
    networks:
      - synova-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'

  # PostgreSQL Database
  synova-db:
    image: postgres:15-alpine
    container_name: synova-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: synova_ai
      POSTGRES_USER: synova_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-synova_secure_2024}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - synova-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synova_user -d synova_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  synova-redis:
    image: redis:7-alpine
    container_name: synova-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secure_2024}
    volumes:
      - ./data/redis:/data
    networks:
      - synova-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Core API Service
  synova-core-api:
    build:
      context: ./synova-core-api
      dockerfile: Dockerfile
    container_name: synova-core-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://synova_user:${POSTGRES_PASSWORD:-synova_secure_2024}@synova-db:5432/synova_ai
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secure_2024}@synova-redis:6379
      - OLLAMA_HOST=http://synova-brain:11434
      - SECRET_KEY=${SECRET_KEY:-synova_secret_key_2024_ultra_secure}
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
    volumes:
      - ./data/api:/app/data
      - ./logs:/app/logs
    networks:
      - synova-network
    depends_on:
      synova-db:
        condition: service_healthy
      synova-redis:
        condition: service_healthy
      synova-brain:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  # Holo Architecture Renderer
  synova-holo-renderer:
    build:
      context: ./synova-holo-renderer
      dockerfile: Dockerfile
    container_name: synova-holo-renderer
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - CORE_API_URL=http://synova-core-api:8000
      - OUTPUT_DIR=/app/output
    volumes:
      - ./data/models:/app/output
      - ./logs/renderer:/app/logs
    networks:
      - synova-network
    depends_on:
      synova-core-api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.5'

  # UI System (Glassmorphism Frontend)
  synova-ui-system:
    build:
      context: ./synova-ui-system
      dockerfile: Dockerfile
    container_name: synova-ui-system
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_RENDERER_URL=http://localhost:3001
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/ws
    networks:
      - synova-network
    depends_on:
      synova-core-api:
        condition: service_healthy
      synova-holo-renderer:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # Nginx Reverse Proxy
  synova-nginx:
    image: nginx:alpine
    container_name: synova-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./logs/nginx:/var/log/nginx
    networks:
      - synova-network
    depends_on:
      - synova-core-api
      - synova-holo-renderer
      - synova-ui-system
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Monitoring - Prometheus
  synova-prometheus:
    image: prom/prometheus:latest
    container_name: synova-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./data/prometheus:/prometheus
    networks:
      - synova-network
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'

  # Monitoring - Grafana
  synova-grafana:
    image: grafana/grafana:latest
    container_name: synova-grafana
    ports:
      - "9000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-synova_grafana_2024}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./data/grafana:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - synova-network
    depends_on:
      - synova-prometheus
    restart: unless-stopped

  # Log Aggregation - Loki
  synova-loki:
    image: grafana/loki:latest
    container_name: synova-loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki.yml:/etc/loki/local-config.yaml
      - ./data/loki:/loki
    networks:
      - synova-network
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml

  # Development Tools - Adminer (Database Admin)
  synova-adminer:
    image: adminer:latest
    container_name: synova-adminer
    ports:
      - "8080:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=synova-db
    networks:
      - synova-network
    depends_on:
      - synova-db
    restart: unless-stopped
    profiles:
      - development

  # Development Tools - Redis Commander
  synova-redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: synova-redis-commander
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:synova-redis:6379:0:${REDIS_PASSWORD:-redis_secure_2024}
    networks:
      - synova-network
    depends_on:
      - synova-redis
    restart: unless-stopped
    profiles:
      - development

networks:
  synova-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ollama_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local

# Development override
x-development: &development
  environment:
    - NODE_ENV=development
    - LOG_LEVEL=DEBUG
  volumes:
    - .:/app
    - /app/node_modules

# Production override
x-production: &production
  environment:
    - NODE_ENV=production
    - LOG_LEVEL=INFO
  restart: unless-stopped
  deploy:
    resources:
      limits:
        memory: 1G
        cpus: '1.0'
